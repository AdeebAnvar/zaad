org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=192m -XX:HeapBaseMinAddress=2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
